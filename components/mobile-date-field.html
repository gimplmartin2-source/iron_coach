<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Date Field - 332x48</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Datumsfeld Container - exakt 332x48 */
        .date-field-container {
            width: 332px;
            height: 48px;
            position: relative;
        }

        /* Das Datumsfeld selbst */
        .date-field {
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #16213e 0%, #0f3460 100%);
            border: 1px solid #e94560;
            border-radius: 8px;
            padding: 0 44px 0 12px;
            font-size: 16px;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-appearance: none;
            appearance: none;
        }

        .date-field:hover {
            border-color: #ff6b7a;
            box-shadow: 0 0 8px rgba(233, 69, 96, 0.3);
        }

        .date-field:focus {
            outline: none;
            border-color: #e94560;
            box-shadow: 0 0 12px rgba(233, 69, 96, 0.4);
        }

        /* Calendar Icon */
        .date-field-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            pointer-events: none;
            color: #e94560;
        }

        /* Alternative: Input mit Button */
        .date-field-wrapper {
            width: 332px;
            height: 48px;
            display: flex;
            background: linear-gradient(145deg, #16213e 0%, #0f3460 100%);
            border: 1px solid #e94560;
            border-radius: 8px;
            overflow: hidden;
        }

        .date-input {
            flex: 1;
            height: 100%;
            background: transparent;
            border: none;
            padding: 0 12px;
            font-size: 16px;
            color: #fff;
            cursor: pointer;
        }

        .date-input:focus {
            outline: none;
        }

        .date-button {
            width: 44px;
            height: 100%;
            background: transparent;
            border: none;
            border-left: 1px solid rgba(233, 69, 96, 0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e94560;
            transition: all 0.2s ease;
        }

        .date-button:hover {
            background: rgba(233, 69, 96, 0.1);
        }

        /* Native Date Input - versteckt aber funktional */
        input[type="date"]::-webkit-calendar-picker-indicator {
            position: absolute;
            right: 0;
            top: 0;
            width: 44px;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* Demo Labels */
        .label {
            color: #fff;
            font-size: 14px;
            margin-bottom: -12px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="label">Variante 1: Native Date Input (empfohlen)</div>
    <div class="date-field-container">
        <input type="date" class="date-field" value="2026-03-30">
        <svg class="date-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
    </div>

    <div class="label">Variante 2: Text Input + Button</div>
    <div class="date-field-wrapper">
        <input type="text" class="date-input" value="30.03.2026" readonly>
        <button class="date-button">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
        </button>
    </div>

</body>
</html>
