<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Field Demo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Zusätzliche Styles für Demo */
        .demo-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .demo-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 25px;
        }
        .demo-title {
            text-align: center;
            margin-bottom: 25px;
            color: #00d4ff;
        }
    </style>
</head>
<body>
    <div class="demo-container">
        <div class="demo-card">
            <h2 class="demo-title">📅 Neues Workout</h2>
            
            <!-- Formular mit Date Field -->
            <form>
                <div class="form-row">
                    <div class="form-group date-field-container">
                        <label>Datum</label>
                        <div class="date-input-wrapper">
                            <input type="date" id="workout-date" class="date-field-mobile" value="2026-03-30" required>
                            <svg class="date-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="16" y1="2" x2="16" y2="6"></line>
                                <line x1="8" y1="2" x2="8" y2="6"></line>
                                <line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                        </div>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Gewicht (kg)</label>
                        <input type="number" placeholder="80.0" step="0.5" min="0">
                    </div>
                    <div class="form-group">
                        <label>Sätze</label>
                        <input type="number" placeholder="3" min="1">
                    </div>
                    
                    <div class="form-group">
                        <label>Wdh./Satz</label>
                        <input type="number" placeholder="10" min="1">
                    </div>
                </div>
                
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 20px;">💾 Speichern</button>
            </form>
        </div>
        
        <div style="text-align: center; margin-top: 20px; color: #888;">
            <p>✅ Maße: 332x48px</p>
            <p>✅ Farben: #00d4ff (Cyan Border), Web App Style</p>
        </div>
    </div>
</body>
</html>
