<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bankdrücken Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #fff;
            padding: 20px;
            margin: 0;
            text-align: center;
        }
        h1 {
            color: #00d4ff;
            margin-bottom: 10px;
        }
        .container {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid rgba(0,212,255,0.3);
        }
        img {
            width: 100%;
            max-width: 400px;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
            margin: 15px 0;
        }
        .status {
            color: #888;
            font-size: 0.9rem;
            margin-top: 10px;
        }
        button {
            background: linear-gradient(45deg, #00d4ff, #7b2cbf);
            border: none;
            color: #fff;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            margin: 10px;
        }
        #result {
            color: #00ff88;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <h1>🏋️ Bankdrücken Test</h1>
    
    <div class="container">
        <h2>GIF Ansicht</h2>
        
        <img id="exercise-img" 
             src="/exercises/bankdruecken_langhantel_flachbank.gif" 
             alt="Bankdrücken">
        
        <p id="status" class="status">Lade...</p>
        <p id="result"></p>
        
        <button onclick="testAnimation()">🎬 Animation testen</button>
        <button onclick="reloadImage()">🔄 Neu laden</button>
    </div>
    
    <div style="margin-top: 30px;">
        <p style="color: #888;">
            Ergebnis mitteilen: Welcher Button funktioniert?
        </p>
    </div>
    
    <script>
        const img = document.getElementById('exercise-img');
        const status = document.getElementById('status');
        const result = document.getElementById('result');
        
        // Status beim Laden
        img.onload = function() {
            status.textContent = '✅ Bild geladen';
            status.style.color = '#00ff88';
        };
        
        img.onerror = function() {
            status.textContent = '❌ Fehler beim Laden';
            status.style.color = '#ff4444';
        };
        
        function testAnimation() {
            result.textContent = 'Teste...';
            
            // Alle 500ms neu laden = 2 FPS
            let frame = 0;
            const interval = setInterval(() => {
                img.src = '/exercises/bankdruecken_langhantel_flachbank.gif?' + Date.now();
                frame++;
                result.textContent = 'Frame: ' + frame;
                
                if (frame >= 20) {
                    clearInterval(interval);
                    result.textContent = '✅ Test abgeschlossen (20 Frames)';
                }
            }, 500);
        }
        
        function reloadImage() {
            img.src = '/exercises/bankdruecken_langhantel_flachbank.gif?' + Date.now();
            status.textContent = 'Neu geladen...';
        }
    </script>
</body>
</html>
