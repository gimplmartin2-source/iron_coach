<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF Test</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #1a1a2e; color: white; }
        .gif-container { display: flex; flex-wrap: wrap; gap: 20px; }
        .gif-item { text-align: center; }
        img, video { width: 200px; height: 150px; object-fit: cover; border-radius: 8px; background: #333; }
        .label { margin-top: 10px; font-size: 12px; }
    </style>
</head>
<body>
    <h1>🧪 GIF Test für Chrome Mobile</h1>
    <p>Teste verschiedene Ladeweisen:</p>
    
    <h2>1. Normales Bild</h2>
    <div class="gif-container">
        <div class="gif-item">
            <img src="/exercises/plank.gif" alt="Plank">
            <div class="label">Plank (Standard)</div>
        </div>
    </div>
    
    <h2>2. Mit Cache-Busting</h2>
    <div class="gif-container">
        <div class="gif-item">
            <img id="gif-cb" alt="Beinheben Cache-Busting">
            <div class="label">Beinheben (Cache-Busting)</div>
        </div>
    </div>
    
    <h2>3. Fetch & Blob URL</h2>
    <div class="gif-container">
        <div class="gif-item">
            <img id="gif-blob" alt="Beinheben Blob">
            <div class="label">Beinheben (Blob URL)</div>
        </div>
    </div>
    
    <h2>4. Als Background Image</h2>
    <div class="gif-container">
        <div class="gif-item">
            <div id="gif-bg" style="width: 200px; height: 150px; border-radius: 8px; background: #333; background-size: cover;"></div>
            <div class="label">Beinheben (Background)</div>
        </div>
    </div>
    
    <script>
        const timestamp = Date.now();
        
        // Test 2: Cache-Busting
        document.getElementById('gif-cb').src = `/exercises/liegendes_beinheben-1.gif?v=2&t=${timestamp}`;
        
        // Test 3: Fetch als Blob
        fetch('/exercises/liegendes_beinheben-1.gif')
            .then(r => r.blob())
            .then(blob => {
                const url = URL.createObjectURL(blob);
                document.getElementById('gif-blob').src = url;
            })
            .catch(e => console.error('Blob failed:', e));
        
        // Test 4: Background Image
        document.getElementById('gif-bg').style.backgroundImage = `url(/exercises/liegendes_beinheben-1.gif?v=2&t=${timestamp})`;
        
        // Log loaded images
        document.querySelectorAll('img').forEach(img => {
            img.onload = () => console.log('✅ Loaded:', img.alt);
            img.onerror = () => console.log('❌ Error:', img.alt);
        });
    </script>
</body>
</html>
