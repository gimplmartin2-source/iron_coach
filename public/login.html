<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronCoach - Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
        }
        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
        }
        .auth-tab {
            flex: 1;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border: none;
            color: #888;
            cursor: pointer;
            transition: all 0.3s;
        }
        .auth-tab:first-child {
            border-radius: 8px 0 0 8px;
        }
        .auth-tab:last-child {
            border-radius: 0 8px 8px 0;
        }
        .auth-tab.active {
            background: linear-gradient(45deg, #00d4ff, #7b2cbf);
            color: #fff;
        }
        .auth-form {
            display: none;
        }
        .auth-form.active {
            display: block;
        }
        .google-btn {
            width: 100%;
            padding: 15px;
            background: #fff;
            color: #333;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s;
        }
        .google-btn:hover {
            transform: translateY(-2px);
        }
        .divider {
            text-align: center;
            margin: 30px 0;
            position: relative;
        }
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        .divider span {
            background: #1a1a2e;
            padding: 0 15px;
            position: relative;
            color: #888;
        }
        .error-msg {
            color: #ff6666;
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card auth-container">
            <header style="text-align: center; margin-bottom: 30px;">
                <h1>💪 IronCoach</h1>
                <p>Dein persönlicher Trainings-Tracker</p>
            </header>

            <!-- Google Login (wird ausgeblendet wenn nicht verfügbar) -->
            <a href="/auth/google" class="google-btn" id="google-login-btn" style="display: none;">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Mit Google anmelden
            </a>

            <div class="divider" id="google-divider" style="display: none;">
                <span>ODER</span>
            </div>

            <!-- Auth Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchAuthTab('login')">Login</button>
                <button class="auth-tab" onclick="switchAuthTab('register')">Registrieren</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active" onsubmit="handleLogin(event)">
                <!-- Google Login -->
                <a href="/auth/google" class="google-btn" style="text-decoration: none; display: flex; margin-bottom: 20px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" style="margin-right: 10px;">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Mit Google anmelden
                </a>
                
                <div class="divider" style="margin: 20px 0;">
                    <span>ODER</span>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" required placeholder="deine@email.com">
                </div>
                <div class="form-group">
                    <label>Passwort</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">Einloggen</button>
                <p id="login-error" class="error-msg"></p>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="register-name" placeholder="Max Mustermann">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="register-email" required placeholder="deine@email.com">
                </div>
                <div class="form-group">
                    <label>Passwort (min. 6 Zeichen)</label>
                    <input type="password" id="register-password" required minlength="6" placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">Konto erstellen</button>
                <p id="register-error" class="error-msg"></p>
            </form>
        </div>
    </div>

    <script>
        // WICHTIG: Prüfe erst, ob wir von Google zurückkommen
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        // Token aus URL speichern und User laden
        if (token) {
            localStorage.setItem('token', token);
            // User aus Token decodieren (Basis64 Payload)
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                localStorage.setItem('user', JSON.stringify({
                    email: payload.email,
                    id: payload.userId
                }));
            } catch(e) {
                console.log('Konnte User nicht decodieren');
            }
            window.location.href = '/'; // Redirect zur App
        } else {
            // Normaler Seitenaufbau
            initPage();
        }
        
        function initPage() {
            console.log('✅ Login-Seite geladen');
            
            // Prüfe ob Google OAuth verfügbar ist
            fetch('/api/health')
                .then(res => res.json())
                .then(data => {
                    if (data.googleOAuth) {
                        document.getElementById('google-login-btn').style.display = 'flex';
                        document.getElementById('google-divider').style.display = 'block';
                        console.log('✅ Google OAuth verfügbar');
                    }
                })
                .catch(err => console.log('ℹ️ Health Check fehlgeschlagen:', err));
        }

        function switchAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(el => el.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + '-form').classList.add('active');
        }

        async function handleLogin(e) {
            e.preventDefault();
            e.stopPropagation();
            
            const errorEl = document.getElementById('login-error');
            errorEl.classList.remove('show');
            errorEl.textContent = '';

            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            if (!email || !password) {
                errorEl.textContent = 'Email und Passwort erforderlich';
                errorEl.classList.add('show');
                return;
            }
            
            const btn = e.target.querySelector('button[type="submit"]');
            btn.textContent = '⏳ Lade...';
            btn.disabled = true;

            try {
                console.log('📤 Sende Login:', email);
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                    credentials: 'include'
                });

                const data = await res.json();
                console.log('📥 Antwort:', res.status, data);

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/';
                } else {
                    errorEl.textContent = data.error || `Login fehlgeschlagen (${res.status})`;
                    errorEl.classList.add('show');
                }
            } catch (err) {
                console.error('❌ Fehler:', err);
                errorEl.textContent = 'Verbindungsfehler - prüfe deine Internetverbindung';
                errorEl.classList.add('show');
            } finally {
                btn.textContent = 'Einloggen';
                btn.disabled = false;
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            e.stopPropagation();
            
            const errorEl = document.getElementById('register-error');
            errorEl.classList.remove('show');
            errorEl.textContent = '';

            const displayName = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            
            if (!email || !password) {
                errorEl.textContent = 'Email und Passwort erforderlich';
                errorEl.classList.add('show');
                return;
            }
            
            if (password.length < 6) {
                errorEl.textContent = 'Passwort muss mindestens 6 Zeichen haben';
                errorEl.classList.add('show');
                return;
            }
            
            const btn = e.target.querySelector('button[type="submit"]');
            btn.textContent = '⏳ Lade...';
            btn.disabled = true;

            try {
                console.log('📤 Sende Registrierung:', email);
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ displayName, email, password }),
                    credentials: 'include'
                });

                const data = await res.json();
                console.log('📥 Antwort:', res.status, data);

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/';
                } else {
                    errorEl.textContent = data.error || `Registrierung fehlgeschlagen (${res.status})`;
                    errorEl.classList.add('show');
                }
            } catch (err) {
                console.error('❌ Fehler:', err);
                errorEl.textContent = 'Verbindungsfehler - prüfe deine Internetverbindung';
                errorEl.classList.add('show');
            } finally {
                btn.textContent = 'Konto erstellen';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
