services:
  - type: web
    name: ironcoach-tracker
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      # Google OAuth - REQUIRED für Sheets:
      - key: GOOGLE_CLIENT_ID
        sync: false  # Setzen in Render Dashboard
      - key: GOOGLE_CLIENT_SECRET
        sync: false  # Setzen in Render Dashboard
      - key: GOOGLE_CALLBACK_URL
        sync: false  # z.B. https://trainings-tracker.onrender.com/auth/google/callback
